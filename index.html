<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>中华李氏字辈查询系统</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
  <h2>中华李氏字辈查询系统 - 首页</h2>
</header>

<main>

  <!-- 搜索框 -->
  <div class="search-box">
    <input type="text" id="key1" placeholder="请输入关键字">
    <button id="searchBtn">精准查询</button>
    <button id="fuzzyBtn">模糊查询</button>
  </div>

  <!-- iframe 显示原页面 -->
  <iframe id="contentFrame" name="contentFrame" src="pages/all_zibei.html"></iframe>

  <!-- 查询结果 -->
  <div id="result"></div>

</main>

<footer>
  © 2025 中华李氏字辈查询系统
  <span class="hit-line">
    <img class="v-badge" src="https://visitor-badge.laobi.icu/badge?page_id=danding2023.mongo_web">
  </span>
</footer>

<!-- 外部查询逻辑（必须保留） -->
<script src="/mongo_web/js/zibeichaxun.js"></script>

<!-- iframe 自适应高度 -->
<script>
  const iframe = document.getElementById('contentFrame');

  iframe.addEventListener('load', () => {
    try {
      const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
      iframe.style.height = iframeDoc.body.scrollHeight + 'px';
    } catch(e) {
      console.warn('iframe 高度自适应失败（可能跨域）', e);
    }
  });
</script>

<!-- 精简后的查询逻辑 -->
<script>
(() => {
  const strictBtn = document.getElementById('searchBtn');
  const fuzzyBtn  = document.getElementById('fuzzyBtn');
  const input     = document.getElementById('key1');
  const result    = document.getElementById('result');

  const API_URL = 'https://zibei-data-api.271776169.workers.dev/zibeiyugaikuang.json';

  let cache = null;

  // ===== 获取数据 =====
  async function getData(){
    if(cache) return cache;

    result.textContent = '加载数据中...';

    const res = await fetch(API_URL + '?v=' + Date.now());
    if(!res.ok) throw new Error('接口错误 ' + res.status);

    cache = await res.json();
    return cache;
  }

  // ===== 查询 =====
  const doQuery = async(strict=false)=>{
    const kw = input.value.trim();
    if(!kw) return alert('请至少输入一个关键字！');

    result.textContent = '查询中...';

    try{
      const data = await getData();
      const hit = strict ? Zibeichaxun.queryStrict(data,kw)
                         : Zibeichaxun.query(data,kw);

      if(!hit.length){
        result.innerHTML = '<p>查不到相关数据</p>';
        return;
      }

      const countHtml = `<p style="margin:4px 0;color:#555;">
        共查到 <strong>${hit.length}</strong> 条记录。
      </p>`;

      const kwArr = Array.from(kw.replace(/\s+/g,''));
      const highlight = str =>
        Array.from(str)
          .map(ch => kwArr.includes(ch) ? `<span class="highlight-key">${ch}</span>` : ch)
          .join('，');

      let html = countHtml +
        '<table border="1" cellpadding="6">' +
        '<tr><th>ID号</th><th>聚居地</th><th>字辈用字</th><th>备注</th></tr>';

      hit.forEach(({ID号,聚居地,字辈用字,备注})=>{
        html += `<tr>
          <td>${ID号}</td>
          <td>${聚居地}</td>
          <td>${highlight(字辈用字)}</td>
          <td>${备注 || ''}</td>
        </tr>`;
      });

      result.innerHTML = html + '</table>';

    }catch(e){
      result.innerHTML = `<p style="color:red;">查询出错：${e.message}</p>`;
    }
  };

  // ===== 事件 =====
  strictBtn.addEventListener('click',()=>doQuery(true));
  fuzzyBtn.addEventListener('click',()=>doQuery(false));
  input.addEventListener('keyup',e=>{
    if(e.key==='Enter') fuzzyBtn.click();
  });

})();
</script>

</body>
</html>
